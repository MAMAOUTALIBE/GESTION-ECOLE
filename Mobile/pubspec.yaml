name: gestion_ee_terrain
description: GESTION-EE - App terrain inspecteurs/directeurs (offline-first)
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mobile_scanner: ^5.2.3
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  connectivity_plus: ^6.1.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
