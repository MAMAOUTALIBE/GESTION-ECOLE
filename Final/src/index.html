<head>

  <script src="https://maps.google.com/maps/api/js?key=AIzaSyBBm4b4JR9pe-V7Pe4FRCvDKDnjmVzSBeI"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <script>
    // Module 16 PWA cleanup: a previous app on 127.0.0.1:4200 (SNBGEE-GN / "Pilote
    // Local Conakry") had registered Service Workers and CacheStorage that
    // intercepted requests. We now unregister ONLY foreign SWs (not ngsw-worker.js
    // which is our Angular Service Worker installed in production). Cheap to run.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          var url = (r.active && r.active.scriptURL) || (r.installing && r.installing.scriptURL) || (r.waiting && r.waiting.scriptURL) || '';
          // Keep our Angular Service Worker (ngsw-worker.js); unregister legacy SWs.
          if (url.indexOf('ngsw-worker.js') === -1) {
            r.unregister();
          }
        });
      }).catch(function () { /* best-effort */ });
      if (typeof caches !== 'undefined') {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) {
            // Preserve Angular SW caches (prefix "ngsw:") and clear legacy ones.
            if (k.indexOf('ngsw:') !== 0) {
              caches.delete(k);
            }
          });
        }).catch(function () { /* best-effort */ });
      }
    })();
  </script>
</head>

</body>
