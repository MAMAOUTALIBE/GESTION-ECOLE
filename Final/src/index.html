  <script>
    // Phase 9 cleanup: a previous PWA on 127.0.0.1:4200 (SNBGEE-GN / "Pilote
    // Local Conakry") had registered Service Workers and CacheStorage that
    // intercepted requests. Wipe them on every load so the current app is
    // never shadowed. Cheap to run when nothing is registered.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () { /* best-effort */ });
      if (typeof caches !== 'undefined') {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () { /* best-effort */ });
      }
    })();
  </script>
</head>
