<div
  class="investment-kpi card custom-card h-100"
  [class.investment-kpi--selected]="selected()"
  role="button"
  tabindex="0"
  (click)="onSelect()"
  (keyup.enter)="onSelect()"
  [attr.aria-label]="title() + ' (' + value() + ')'"
  [attr.aria-pressed]="selected()"
>
  <div class="card-body d-flex align-items-start gap-3">
    <span class="investment-kpi__icon" [ngClass]="categoryClass()">
      <i [class]="icon()"></i>
    </span>
    <div class="flex-grow-1">
      <p class="text-muted fs-12 mb-1">{{ title() }}</p>
      <div class="d-flex align-items-baseline gap-2 flex-wrap">
        <h4 class="fw-semibold mb-0">{{ value() }}</h4>
        <span class="badge fs-11" [ngClass]="categoryClass()">
          {{ value() === 1 ? 'école' : 'écoles' }}
        </span>
      </div>
      @if (subtitle()) {
        <p class="text-muted fs-12 mb-0 mt-1">{{ subtitle() }}</p>
      }
    </div>
  </div>
</div>
