<div class="card custom-card h-100">
  <div class="card-header">
    <div class="card-title">{{ title() }}</div>
  </div>
  <div class="card-body">
    @if (hasData()) {
      <spk-apexcharts id="equite-zone-donut" [chartOptions]="options()" />
      <div class="mt-3 text-center text-muted fs-12">
        Source : aggregate Module 1A (byZoneType)
      </div>
    } @else {
      <p class="text-muted mb-0">Aucun effectif désagrégé par zone disponible.</p>
    }
  </div>
</div>
